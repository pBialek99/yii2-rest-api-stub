services:
  # --------------------------
  # ---- SERVER CONTAINER ----
  # --------------------------
  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile

    container_name: yii2-rest-api-stub-nginx

    ports:
      - "${NGINX_PORT}:80"

    volumes:
      - .:/app

    depends_on:
      - php

    restart: unless-stopped

  # --------------------------
  # --- PHP-FPM CONTAINER ----
  # --------------------------
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile

    container_name: yii2-rest-api-stub-php-fpm

    volumes:
      - .:/app

    environment:
      ENV: ${ENV}

    depends_on:
      - postgres

    restart: unless-stopped

  # --------------------------
  # --- DATABASE CONTAINER ---
  # --------------------------
  postgres:
    image: postgres:17

    container_name: yii2-rest-api-stub-postgres

    ports:
      - "${POSTGRES_PORT}:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data:
